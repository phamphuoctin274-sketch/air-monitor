<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Hệ thống giám sát chất lượng không khí</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

</head>

<body>

<header>

<h1>HỆ THỐNG GIÁM SÁT CHẤT LƯỢNG KHÔNG KHÍ</h1>

</header>

<nav>

<button onclick="showTab('current')">
Dữ liệu hiện tại
</button>

<button onclick="showTab('history')">
Lịch sử
</button>

</nav>

<main>

<section id="currentTab">

<h2>Dữ liệu hiện tại</h2>

<div class="time-control">

<label>Khoảng thời gian:</label>

<select id="timeRange">

<option value="3">3 giờ</option>

<option value="6">6 giờ</option>

<option value="custom">Tùy chỉnh</option>

</select>

<input type="datetime-local" id="startTime">

<input type="datetime-local" id="endTime">

<button onclick="loadCurrentData()">Tải dữ liệu</button>

</div>

<div class="charts">

<div class="chart-box">

<h3>Nhiệt độ</h3>

<canvas id="tempChart"></canvas>

</div>

<div class="chart-box">

<h3>Độ ẩm</h3>

<canvas id="humChart"></canvas>

</div>

<div class="chart-box">

<h3>PM2.5</h3>

<canvas id="pmChart"></canvas>

</div>

</div>

</section>

<section id="historyTab" style="display:none">

<h2>Lịch sử dữ liệu</h2>

<div class="history-control">

<label>Từ:</label>

<input type="datetime-local" id="historyStart">

<label>Đến:</label>

<input type="datetime-local" id="historyEnd">

<button onclick="loadHistory()">Xem dữ liệu</button>

<button onclick="downloadExcel()">Tải Excel</button>

</div>

<table id="historyTable">

<thead>

<tr>

<th>Thời gian</th>

<th>Nhiệt độ (°C)</th>

<th>Độ ẩm (%)</th>

<th>PM2.5</th>

<th>AQI</th>

<th>Cảnh báo</th>

</tr>

</thead>

<tbody>

</tbody>

</table>

</section>

</main>

<footer>

<p>Air Quality Monitoring System</p>

</footer>

<script src="script.js"></script>

</body>

</html>
