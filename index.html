<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Air Monitor Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background-color: #f4f4f4; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); display: inline-block; }
        .value { font-size: 24px; font-weight: bold; color: #2c3e50; }
        .label { color: #7f8c8d; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Hệ Thống Theo Dõi Không Khí</h1>
        
        <div class="label">Nhiệt độ:</div>
        <div class="value"><span id="temp">--</span> °C</div>
        <hr>
        <div class="label">Độ ẩm:</div>
        <div class="value"><span id="humi">--</span> %</div>
        <hr>
        <div class="label">Nồng độ bụi:</div>
        <div class="value"><span id="dust">--</span> mg/m³</div>
        <p id="time" style="font-size: 12px; color: grey;"></p>
    </div>

    <script>
        // Cấu hình Firebase
        const firebaseConfig = {
            databaseURL: "https://forest-air-polution-default-rtdb.firebaseio.com/"
        };

        // Khởi tạo Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Lấy dữ liệu mới nhất từ THƯ MỤC GỐC (vì ảnh database của bạn dữ liệu nằm ở ngoài cùng)
        // Nếu sau này bạn đổi ESP32 gửi vào "/AirQuality" thì sửa dấu "/" thành "/AirQuality"
        db.ref("/").limitToLast(1).on("value", (snapshot) => {
            snapshot.forEach((childSnapshot) => {
                const data = childSnapshot.val();
                
                // Cập nhật lên giao diện
                document.getElementById("temp").innerText = data.temp !== undefined ? data.temp : "--";
                document.getElementById("humi").innerText = data.humi !== undefined ? data.humi : "--";
                document.getElementById("dust").innerText = data.dust !== undefined ? data.dust.toFixed(3) : "--";
                document.getElementById("time").innerText = "Cập nhật lúc: " + (data.time || "Không rõ");
                
                console.log("Dữ liệu mới:", data);
            });
        });
    </script>

</body>
</html>
