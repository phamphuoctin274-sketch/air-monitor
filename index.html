<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Thông Tin Không Khí</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .card-group { display: flex; justify-content: space-around; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); flex: 1; min-width: 200px; }
        .value { font-size: 32px; font-weight: bold; color: #2c3e50; margin-top: 10px; }
        .label { color: #7f8c8d; text-transform: uppercase; font-size: 13px; font-weight: 600; }
        .chart-container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        #dust-val { color: #e74c3c; }
        .status { font-size: 12px; color: #95a5a6; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="container">
        <h2 style="color: #2c3e50; margin-bottom: 30px;">HỆ THỐNG GIÁM SÁT & DỰ BÁO KHÔNG KHÍ</h2>
        
        <div class="card-group">
            <div class="card">
                <div class="label">Nhiệt độ</div>
                <div class="value"><span id="temp-val">--</span><small>°C</small></div>
            </div>
            <div class="card">
                <div class="label">Độ ẩm</div>
                <div class="value"><span id="humi-val">--</span><small>%</small></div>
            </div>
            <div class="card">
                <div class="label">Bụi (PM2.5)</div>
                <div class="value"><span id="dust-val">--</span><small style="font-size: 14px;"> mg/m³</small></div>
            </div>
        </div>

        <div class="chart-container">
            <canvas id="airChart"></canvas>
        </div>
        <div id="status" class="status">Đang kết nối cơ sở dữ liệu...</div>
    </div>

    <script type="module">
        // Nhúng Firebase v10 kiểu Module - Khắc phục lỗi Uncaught (in promise)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // Cấu hình từ Firebase của bạn
        const firebaseConfig = {
            databaseURL: "https://forest-air-polution-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Khởi tạo Biểu đồ Chart.js
        const ctx = document.getElementById('airChart').getContext('2d');
        const airChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Nồng độ bụi thực tế',
                    borderColor: '#e74c3c',
                    backgroundColor: 'rgba(231, 76, 60, 0.1)',
                    data: [],
                    fill: true,
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: { beginAtZero: true, title: { display: true, text: 'mg/m³' } }
                }
            }
        });

        // Lắng nghe dữ liệu tại /AirQuality (Theo code ESP32 của bạn)
        const airRef = query(ref(db, "AirQuality"), limitToLast(15));
        
        onValue(airRef, (snapshot) => {
            if (snapshot.exists()) {
                const dataObj = snapshot.val();
                const labels = [];
                const values = [];
                let lastEntry = null;

                // Duyệt qua các ID tự động
                Object.keys(dataObj).forEach(key => {
                    const entry = dataObj[key];
                    if (entry.dust !== undefined) {
                        // Lấy giờ phút giây từ time (2026-03-14T10:30:00 -> 10:30:00)
                        let timeLabel = entry.time ? entry.time.split('T')[1] : "";
                        labels.push(timeLabel);
                        values.push(entry.dust);
                        lastEntry = entry;
                    }
                });

                // Cập nhật giao diện số
                if (lastEntry) {
                    document.getElementById("temp-val").innerText = lastEntry.temp.toFixed(1);
                    document.getElementById("humi-val").innerText = lastEntry.humi.toFixed(0);
                    document.getElementById("dust-val").innerText = lastEntry.dust.toFixed(3);
                    document.getElementById("status").innerText = "Cập nhật cuối: " + new Date().toLocaleTimeString();
                }

                // Cập nhật biểu đồ
                airChart.data.labels = labels;
                airChart.data.datasets[0].data = values;
                airChart.update();
            } else {
                document.getElementById("status").innerText = "Chưa tìm thấy dữ liệu trong thư mục /AirQuality";
            }
        }, (error) => {
            console.error("Lỗi Firebase:", error);
            document.getElementById("status").innerText = "Lỗi: Kiểm tra Rules trong Firebase!";
        });
    </script>
</body>
</html>
