<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<title>IoT Air Monitor</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
display:flex;
background:#f4f7f6;
}

/* sidebar */

.sidebar{
width:220px;
background:#2c3e50;
color:white;
height:100vh;
padding-top:20px;
}

.sidebar h2{
text-align:center;
}

.sidebar button{
width:100%;
padding:15px;
border:none;
background:none;
color:white;
text-align:left;
cursor:pointer;
font-size:16px;
}

.sidebar button:hover{
background:#34495e;
}

.main{
flex:1;
padding:20px;
}

/* card */

.card-group{
display:flex;
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
flex:1;
text-align:center;
box-shadow:0 3px 5px rgba(0,0,0,0.1);
}

.value{
font-size:28px;
font-weight:bold;
}

/* chart */

.chart-box{
background:white;
padding:20px;
margin-top:20px;
border-radius:10px;
height:350px;
}

/* table */

table{
width:100%;
border-collapse:collapse;
background:white;
margin-top:20px;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:center;
}

th{
background:#eee;
}

.filter{
margin-top:20px;
}

.aqi-good{color:green;font-weight:bold;}
.aqi-moderate{color:orange;font-weight:bold;}
.aqi-unhealthy{color:red;font-weight:bold;}

#error{
color:red;
margin-top:10px;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>AQI Monitor</h2>

<button onclick="showPage('realtime')">Thời gian thực</button>

<button onclick="showPage('history')">Lịch sử dữ liệu</button>

</div>

<div class="main">

<!-- realtime -->

<div id="realtime">

<h2>Dữ liệu thời gian thực</h2>

<div class="card-group">

<div class="card">
Nhiệt độ
<div id="temp-val" class="value">--</div>
</div>

<div class="card">
Độ ẩm
<div id="humi-val" class="value">--</div>
</div>

<div class="card">
Bụi
<div id="dust-val" class="value">--</div>
</div>

</div>

</div>
<div id="history" style="display:none">

<h2>Lịch sử dữ liệu</h2>

<div class="filter">

<button onclick="changeRange(3)">3 giờ</button>
<button onclick="changeRange(12)">12 giờ</button>
<button onclick="changeRange(24)">24 giờ</button>

<br><br>

Tùy chỉnh

<input type="datetime-local" id="start">
<input type="datetime-local" id="end">

<button onclick="customRange()">Xem</button>

</div>

<div class="chart-box">
<canvas id="chart"></canvas>
</div>

<div id="error"></div>

<table>

<thead>

<tr>
<th>Thời gian</th>
<th>Nhiệt độ</th>
<th>Độ ẩm</th>
<th>Bụi</th>
<th>AQI</th>
<th>Cảnh báo</th>
</tr>

</thead>

<tbody id="history-body"></tbody>

</table>

</div>

</div>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js"

import {
getDatabase,
ref,
onValue,
query,
orderByKey,
startAt,
endAt
}
from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js"

const firebaseConfig={
databaseURL:"https://forest-air-polution-default-rtdb.firebaseio.com/"
}

const app=initializeApp(firebaseConfig)

const db=getDatabase(app)

function AQI(dust){

let ug=dust*1000

if(ug<=12)
return {v:50,c:"aqi-good",m:"Tốt"}

if(ug<=35)
return {v:100,c:"aqi-moderate",m:"Trung bình"}

return {v:150,c:"aqi-unhealthy",m:"Kém"}

}
const ctx=document.getElementById("chart")

const chart=new Chart(ctx,{
type:"line",
data:{
labels:[],
datasets:[{
label:"Bụi",
data:[]
}]
}
})
function loadData(q){

onValue(q,(snapshot)=>{

let body=document.getElementById("history-body")

body.innerHTML=""

let labels=[]
let values=[]

snapshot.forEach(child=>{

let d=child.val()

if(!d.dust || d.dust==0){

document.getElementById("error").innerText="Lỗi cảm biến bụi"

return
}

let aqi=AQI(d.dust)

let row=`
<tr>
<td>${d.time}</td>
<td>${d.temp.toFixed(1)}</td>
<td>${d.humi.toFixed(0)}</td>
<td>${d.dust.toFixed(3)}</td>
<td class="${aqi.c}">${aqi.v}</td>
<td class="${aqi.c}">${aqi.m}</td>
</tr>
`

body.innerHTML+=row

labels.push(d.time.substring(11,16))
values.push(d.dust)

})

chart.data.labels=labels
chart.data.datasets[0].data=values
chart.update()

})

}
window.changeRange=function(h){

let start=new Date(Date.now()-h*3600000).toISOString()

const q=query(
ref(db,"AirQuality"),
orderByKey(),
startAt(start)
)

loadData(q)

}
window.customRange=function(){

let s=document.getElementById("start").value
let e=document.getElementById("end").value

const q=query(
ref(db,"AirQuality"),
orderByKey(),
startAt(s),
endAt(e)
)

loadData(q)

}
window.showPage=function(p){

document.getElementById("realtime").style.display="none"
document.getElementById("history").style.display="none"

document.getElementById(p).style.display="block"

}
changeRange(24)

</script>

</body>
</html>
