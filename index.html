<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Giám Sát & Lịch Sử AQI</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: auto; }
        .card-group { display: flex; justify-content: space-around; gap: 15px; margin-bottom: 20px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); flex: 1; }
        .value { font-size: 24px; font-weight: bold; color: #2c3e50; }
        
        /* Bảng lịch sử */
        .history-container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-top: 20px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: center; }
        th { background-color: #f8f9fa; color: #333; }
        
        /* Màu sắc cảnh báo AQI */
        .aqi-good { color: #2ecc71; font-weight: bold; }      /* Tốt - Xanh lá */
        .aqi-moderate { color: #f1c40f; font-weight: bold; }  /* Trung bình - Vàng */
        .aqi-unhealthy { color: #e67e22; font-weight: bold; } /* Kém - Cam */
        .aqi-very-unhealthy { color: #e74c3c; font-weight: bold; } /* Xấu - Đỏ */

        .filter-group { margin-bottom: 20px; background: white; padding: 10px; border-radius: 10px; display: inline-block; }
        button { padding: 8px 15px; margin: 0 5px; border: none; border-radius: 5px; cursor: pointer; background: #ecf0f1; }
        button.active { background: #3498db; color: white; }
    </style>
</head>
<body>

    <div class="container">
        <h2>HỆ THỐNG GIÁM SÁT KHÔNG KHÍ & LỊCH SỬ</h2>
        
        <div class="card-group">
            <div class="card"><div>Nhiệt độ</div><div class="value" id="temp-val">--</div></div>
            <div class="card"><div>Độ ẩm</div><div class="value" id="humi-val">--</div></div>
            <div class="card"><div>Bụi (mg/m³)</div><div class="value" id="dust-val">--</div></div>
        </div>

        <div class="filter-group">
            <strong>Xem lịch sử: </strong>
            <button onclick="changeRange(3)" id="btn-3">3 Giờ</button>
            <button onclick="changeRange(12)" id="btn-12">12 Giờ</button>
            <button onclick="changeRange(24)" id="btn-24" class="active">24 Giờ</button>
        </div>

        <div style="background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); height: 350px; margin-bottom: 20px;">
            <canvas id="airChart"></canvas>
        </div>

        <div class="history-container">
            <h3>Bảng Lịch Sử Dữ Liệu Chi Tiết</h3>
            <table>
                <thead>
                    <tr>
                        <th>Thời gian</th>
                        <th>Nhiệt độ (°C)</th>
                        <th>Độ ẩm (%)</th>
                        <th>Bụi (mg/m³)</th>
                        <th>Chỉ số AQI</th>
                        <th>Cảnh báo</th>
                    </tr>
                </thead>
                <tbody id="history-body">
                    </tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue, query, orderByKey, startAt } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://forest-air-polution-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- HÀM TÍNH AQI ĐƠN GIẢN (Dựa trên nồng độ bụi PM2.5 ước tính) ---
        // Lưu ý: Cảm biến Sharp đo mg/m3, ta cần đổi sang µg/m3 (nhân 1000)
        function calculateAQI(dustMg) {
            let ug = dustMg * 1000; 
            if (ug <= 12) return { val: Math.round(ug * 50 / 12), class: 'aqi-good', msg: 'Tốt' };
            if (ug <= 35) return { val: Math.round((ug - 12) * 50 / 23 + 50), class: 'aqi-moderate', msg: 'Trung bình' };
            if (ug <= 55) return { val: Math.round((ug - 35) * 50 / 20 + 100), class: 'aqi-unhealthy', msg: 'Kém' };
            return { val: Math.round((ug - 55) * 100 / 95 + 150), class: 'aqi-very-unhealthy', msg: 'Xấu/Nguy hại' };
        }

        const ctx = document.getElementById('airChart').getContext('2d');
        const airChart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [{ label: 'Nồng độ bụi', borderColor: '#e74c3c', data: [], fill: false }] },
            options: { responsive: true, maintainAspectRatio: false }
        });

        window.changeRange = function(hours) {
            document.querySelectorAll('button').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${hours}`).classList.add('active');

            const startTime = new Date(Date.now() - (hours * 60 * 60 * 1000)).toISOString();
            const airRef = query(ref(db, "AirQuality"), orderByKey(), startAt(startTime));

            onValue(airRef, (snapshot) => {
                const labels = [];
                const values = [];
                const tableBody = document.getElementById("history-body");
                tableBody.innerHTML = ""; // Xóa bảng cũ
                let lastData = null;

                // Duyệt ngược để hiện dữ liệu mới nhất lên đầu bảng
                const dataArray = [];
                snapshot.forEach(child => { dataArray.push(child.val()); });
                dataArray.reverse(); 

                dataArray.forEach(d => {
                    if (d.dust !== undefined && d.dust !== null) {
                        const aqi = calculateAQI(d.dust);
                        const timeStr = d.time ? d.time.replace('T', ' ').substring(0, 19) : "--";

                        // Thêm vào biểu đồ (vẫn theo thứ tự xuôi thời gian)
                        labels.unshift(timeStr.substring(11, 16));
                        values.unshift(d.dust);

                        // Thêm vào bảng
                        let row = `<tr>
                            <td>${timeStr}</td>
                            <td>${d.temp.toFixed(1)}</td>
                            <td>${d.humi.toFixed(0)}</td>
                            <td>${Number(d.dust).toFixed(3)}</td>
                            <td class="${aqi.class}">${aqi.val}</td>
                            <td class="${aqi.class}">${aqi.msg}</td>
                        </tr>`;
                        tableBody.innerHTML += row;
                        if(!lastData) lastData = d;
                    }
                });

                airChart.data.labels = labels.reverse();
                airChart.data.datasets[0].data = values.reverse();
                airChart.update();

                if(lastData) {
                    document.getElementById("temp-val").innerText = lastData.temp.toFixed(1) + "°C";
                    document.getElementById("humi-val").innerText = lastData.humi.toFixed(0) + "%";
                    document.getElementById("dust-val").innerText = Number(lastData.dust).toFixed(3);
                }
            });
        }

        changeRange(24);
    </script>
</body>
</html>
